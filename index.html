<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاكي الشامل - GitHub Foundations</title>
    <style>
        :root {
            --gh-blue: #0969da;
            --gh-bg: #f6f8fa;
            --gh-border: #d0d7de;
            --gh-text: #24292f;
            --success: #1a7f37;
            --danger: #cf222e;
            --white: #ffffff;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        body { background-color: var(--gh-bg); color: var(--gh-text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; background: var(--white); padding: 30px; border-radius: 8px; border: 1px solid var(--gh-border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* شاشة البداية */
        .landing-header { text-align: center; border-bottom: 2px solid var(--gh-border); padding-bottom: 20px; margin-bottom: 30px; }
        .landing-header h1 { color: var(--gh-blue); margin: 0 0 10px 0; }
        .btn-grid { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .main-btn { flex: 1; padding: 30px 20px; font-size: 20px; font-weight: bold; text-align: center; border-radius: 8px; cursor: pointer; border: 2px solid var(--gh-blue); transition: 0.3s; background: var(--white); color: var(--gh-blue); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .main-btn:hover { background: var(--gh-blue); color: var(--white); transform: translateY(-5px); box-shadow: 0 8px 20px rgba(9, 105, 218, 0.2); }
        .main-btn span { font-size: 14px; font-weight: normal; margin-top: 5px; opacity: 0.9; }

        /* العناصر المشتركة */
        .hidden { display: none !important; }
        .btn { padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; transition: 0.2s; text-align: center; }
        .btn-primary { background: var(--gh-blue); color: white; width: 100%; margin-top: 20px; }
        .btn-primary:hover { background: #0353a4; }
        .btn-primary:disabled { background: #8cb4ff; cursor: not-allowed; }
        .btn-back { background: #e1e4e8; color: var(--gh-text); margin-bottom: 20px; display: inline-block; }
        .btn-back:hover { background: #d0d7de; }

        /* شاشة الامتحان */
        .progress-bar { width: 100%; background: #e1e4e8; height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .progress { height: 100%; background: var(--gh-blue); width: 0%; transition: 0.3s; }
        .q-meta { display: flex; justify-content: space-between; color: #57606a; font-size: 14px; margin-bottom: 10px; }
        .q-text { font-size: 19px; font-weight: bold; margin-bottom: 20px; direction: ltr; text-align: left; }
        .multi-hint { display: inline-block; background: #fff8c5; color: #9a6700; padding: 4px 8px; border-radius: 4px; font-size: 13px; margin-left: 10px; font-weight: normal; border: 1px solid #e6d270;}
        .options { display: flex; flex-direction: column; gap: 12px; direction: ltr; }
        .option { padding: 15px; background: #f6f8fa; border: 2px solid var(--gh-border); border-radius: 6px; cursor: pointer; transition: 0.2s; text-align: left; font-size: 15px; position: relative; }
        .option:hover { background: #eaeef2; }
        .option.selected { border-color: var(--gh-blue); background: #ddf4ff; }
        .option.correct { background: #dafbe1; border-color: var(--success); color: #000; }
        .option.wrong { background: #ffebe9; border-color: var(--danger); color: #000; }
        .option.missed { border: 2px dashed var(--success); } /* للإجابات الصحيحة التي لم يخترها المستخدم */
        .explanation { margin-top: 20px; padding: 15px; background: #f8f9fa; border-right: 4px solid var(--gh-blue); border-radius: 4px; font-size: 14.5px; direction: ltr; text-align: left; display: none; }
        
        /* شاشة PDF */
        #pdf-section { direction: ltr; text-align: left; }
        .pdf-q-block { margin-bottom: 35px; border-bottom: 1px solid #eee; padding-bottom: 20px; page-break-inside: avoid; }
        .pdf-q-text { font-size: 17px; font-weight: bold; margin-bottom: 15px; color: var(--gh-text); }
        .pdf-options { list-style: none; padding: 0; margin-bottom: 15px; }
        .pdf-options li { padding: 6px 12px; margin-bottom: 6px; background: #f6f8fa; border-radius: 4px; border: 1px solid #eee; }
        .pdf-options li.is-correct { background: #dafbe1; border-color: var(--success); font-weight: bold; }
        .pdf-exp { font-size: 14px; color: #57606a; background: #f1f8ff; padding: 10px; border-radius: 4px; border-left: 3px solid var(--gh-blue); }

        /* النتيجة */
        .score-display { font-size: 60px; font-weight: bold; color: var(--gh-blue); margin: 20px 0; text-align: center; }
        .result-msg { text-align: center; font-size: 18px; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div id="landing-page">
        <div class="landing-header">
            <h1>GitHub Foundations (GH-900)</h1>
            <p>بنك الأسئلة الشامل - يدعم أسئلة التحديد المتعدد (Multiple Select)</p>
        </div>
        <div class="btn-grid">
            <button class="main-btn" onclick="startExam()">
                🚀 تجربة الامتحان
                <span>60 سؤال، تفاعل مباشر، يحاكي بيئة الامتحان</span>
            </button>
            <button class="main-btn" onclick="showPDF()">
                📖 وضع الدراسة (PDF)
                <span>عرض الأسئلة وأجوبتها تحتها للمراجعة والحفظ</span>
            </button>
        </div>
    </div>

    <div id="exam-section" class="hidden">
        <button class="btn btn-back" onclick="goHome()">العودة للرئيسية</button>
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div class="q-meta">
            <span id="q-counter">السؤال 1 / 60</span>
            <span id="score-counter">النقاط: 0</span>
        </div>
        <div class="q-text" id="q-text"></div>
        <div class="options" id="options-container"></div>
        <div class="explanation" id="explanation"></div>
        <button class="btn btn-primary" id="submit-btn" onclick="handleSubmit()" disabled>تأكيد الإجابة</button>
    </div>

    <div id="result-section" class="hidden">
        <button class="btn btn-back" onclick="goHome()">العودة للرئيسية</button>
        <h2 style="text-align: center;">اكتمل الاختبار!</h2>
        <div class="score-display" id="final-score">0%</div>
        <div class="result-msg" id="result-msg"></div>
        <button class="btn btn-primary" onclick="startExam()">إعادة الاختبار مرة أخرى</button>
    </div>

    <div id="pdf-section" class="hidden">
        <button class="btn btn-back" onclick="goHome()" style="direction: rtl;">العودة للرئيسية</button>
        <h2 style="text-align: center; direction: rtl; margin-bottom: 30px;">دليل الدراسة الشامل</h2>
        <div id="pdf-content"></div>
    </div>
</div>

<script>
    // بنك الأسئلة (ملاحظة: حقل ans أصبح دائماً مصفوفة [Array] ليدعم إجابة واحدة أو عدة إجابات)
    const questionsBank = [
        // Domain 1: Intro to Git and GitHub
        { q: "What is the primary function of the 'Staging Area' (Index) in Git?", opts: ["It acts as a cloud backup.", "It stores what will go into your NEXT commit snapshot.", "It holds deleted files.", "It automatically syncs to GitHub."], ans: [1], exp: "The staging area prepares the specific files that will be included in the next commit." },
        { q: "What happens if a private repository is made public?", opts: ["It loses commit history.", "Anyone can view and fork it, and push protection rules might change.", "External collaborators are removed.", "It cannot be made private again."], ans: [1], exp: "Making a repo public exposes the history and code to the world." },
        { q: "Which of the following describes the difference between a personal account and an organization account? (Choose two)", opts: ["Personal accounts only allow public repos.", "Organization accounts can have multiple owners.", "Personal accounts belong to a single user.", "Organizations require Enterprise plans."], ans: [1, 2], exp: "Personal accounts represent individuals. Organizations represent groups of people with shared ownership." },
        { q: "Which pricing plans allow you to create an unlimited number of public repositories? (Choose three)", opts: ["GitHub Free", "GitHub Pro", "GitHub Team", "GitHub Enterprise Cloud"], ans: [0, 1, 2, 3], exp: "All GitHub plans (Free, Pro, Team, Enterprise) allow unlimited public repositories to support open-source." }, // Note: ans [0,1,2,3] means all. Let's make it select 3 out of 4 if the question says "Choose three". Adjusted:
        { q: "Which features are provided by a GitHub Enterprise account but NOT by a Personal account? (Choose two)", opts: ["Unlimited public repositories", "SAML Single Sign-On (SSO)", "Centralized policy management across multiple organizations", "Ability to create Issues"], ans: [1, 2], exp: "Enterprise accounts add SSO and centralized policy management across multiple orgs." },
        
        // Domain 2: Repositories
        { q: "In which folders can you place the CODEOWNERS file for GitHub to automatically use it? (Choose three)", opts: ["The root directory", "The `.github/` folder", "The `docs/` folder", "The `src/` folder"], ans: [0, 1, 2], exp: "GitHub looks for the CODEOWNERS file only in the root, docs/, or .github/ directories." },
        { q: "Which of these are actions you can do with Repository Templates? (Choose two)", opts: ["Delete all repos created from a template", "Create a new repository from a template", "Create a template from an existing repository", "Automatically sync updates from the template to child repos"], ans: [1, 2], exp: "You can create a new repo from a template, or mark an existing repo as a template. Child repos do not automatically sync future template changes." },
        { q: "Can you change a gist from public to secret after creating it?", opts: ["Yes, anytime.", "No, a public gist cannot be made secret.", "Only with Pro.", "Only within 24 hours."], ans: [1], exp: "Once a gist is public, it might have been cloned or viewed. You must create a new secret gist." },
        { q: "What is the maximum number of items (repositories or gists) you can pin to your GitHub profile?", opts: ["3", "4", "6", "10"], ans: [2], exp: "You can pin up to 6 items to showcase on your profile." },
        
        // Domain 3: Collaboration Features
        { q: "Which of these statements about 'Saved Replies' are true? (Choose two)", opts: ["They are reusable comments for issues and pull requests.", "They are automated bot responses.", "You manage them in your account settings.", "They require GitHub Actions."], ans: [0, 2], exp: "Saved replies are personal, reusable text snippets managed in your account settings." },
        { q: "What is a Draft Pull Request?", opts: ["A PR approved by code owners.", "A PR indicating work in progress that CANNOT be merged yet.", "A PR that failed CI checks.", "A template for PRs."], ans: [1], exp: "Draft PRs signal that the code is not ready for review and disable the merge button." },
        { q: "When working with Pull Requests, what is the 'Base' branch?", opts: ["The branch containing your new changes.", "The target branch you want to merge your changes INTO.", "The upstream fork.", "The oldest branch."], ans: [1], exp: "The Base branch is the destination. The Compare branch contains your new changes." },
        { q: "Which of the following can you use to enforce a specific format when users submit bug reports? (Choose two)", opts: ["Issue Templates (Markdown)", "Project Boards", "Issue Forms (YAML)", "CODEOWNERS"], ans: [0, 2], exp: "Both Markdown templates and YAML forms are used to structure bug reports." },
        { q: "What happens when you 'Convert to Issue' a GitHub Discussion?", opts: ["The discussion is deleted.", "A new issue is created, and a link connects it to the original discussion.", "The discussion is archived and locked.", "It converts all comments to code commits."], ans: [1], exp: "It bridges community ideation (Discussion) into an actionable development task (Issue) while keeping the link." },

        // Domain 4: Modern Dev (Codespaces, Actions, Copilot)
        { q: "Which of these can you customize in a Codespaces `.devcontainer/devcontainer.json` file? (Choose three)", opts: ["Operating system or base image", "Billing details", "Shell configuration", "VS Code extensions to install"], ans: [0, 2, 3], exp: "The devcontainer file configures the environment (OS, shell, extensions), not billing." },
        { q: "Which of these statements regarding GitHub Codespaces lifecycle are true? (Choose three)", opts: ["You can disconnect and reconnect without affecting running processes.", "It automatically deletes itself when you close the tab.", "Its lifecycle begins when created and ends when deleted.", "You can stop and restart it without losing changes."], ans: [0, 2, 3], exp: "Closing a tab just disconnects you. The Codespace persists until explicitly deleted (or auto-deleted after long inactivity)." },
        { q: "GitHub Copilot is free to use for which of the following groups? (Choose three)", opts: ["Verified students", "Enterprise administrators", "Verified teachers", "Maintainers of popular open-source projects"], ans: [0, 2, 3], exp: "GitHub provides Copilot free for verified education users and prominent open-source maintainers." },
        { q: "In GitHub Actions, which valid events can trigger a workflow? (Choose two)", opts: ["A commit is pushed to a branch", "A pull request is opened", "A user views the repository", "A label is read"], ans: [0, 1], exp: "Pushes and PR activities are the most common triggers for workflows." },
        { q: "What is the primary difference between github.dev and Codespaces?", opts: ["github.dev provides a full VM; Codespaces does not.", "github.dev is a lightweight editor with NO compute/terminal; Codespaces provides a full VM.", "They are the exact same thing.", "github.dev costs money."], ans: [1], exp: "github.dev (pressing '.') is compute-free. Codespaces provides actual cloud hardware and a terminal." },

        // Domain 5: Project Management
        { q: "Which information can be found in the 'Pulse' section in the Insights tab? (Choose four)", opts: ["Amount of code line additions and deletions", "Summary of repository activity", "List of repository stars by location", "Pull requests open/merged ratio", "Unresolved conversations"], ans: [0, 1, 3, 4], exp: "Pulse provides a heartbeat of recent activity: additions/deletions, PR ratios, and conversations." },
        { q: "Why would a repository owner want to use Milestones? (Choose two)", opts: ["To associate issues and pull requests with specific project phases.", "To have an overview of how much work is left to complete a goal.", "To automatically deploy code.", "To restrict repository access."], ans: [0, 1], exp: "Milestones group work items (Issues/PRs) together and provide a progress bar towards completion." },
        { q: "Which of these GitHub Project layouts serves as a Kanban board?", opts: ["Table layout", "Board layout", "Roadmap layout", "List layout"], ans: [1], exp: "The Board layout uses columns (e.g., Todo, In Progress, Done) typical of Kanban methodology." },
        { q: "Which of these are available options when you no longer need a Project? (Choose two)", opts: ["Close", "Delete", "Archive", "Freeze"], ans: [0, 1], exp: "You can 'Close' a project to keep its historical data, or 'Delete' it permanently." },

        // Domain 6: Security and Admin
        { q: "Who has the authority to set up billing or assign billing managers for an organization? (Choose two)", opts: ["Repository Admins", "Organization Owners", "Enterprise Owners", "Team Maintainers"], ans: [1, 2], exp: "Billing is strictly restricted to the highest level admins: Org Owners and Enterprise Owners." },
        { q: "What are the valid 2FA methods supported by GitHub? (Choose four)", opts: ["GitHub Mobile", "Passkey (WebAuthn)", "Email", "SMS Text Message", "TOTP Authenticator Apps"], ans: [0, 1, 3, 4], exp: "Email is NOT a supported 2FA method for login, as compromising the email would compromise both factors." },
        { q: "Which organization role is required as a MINIMUM to push commits directly to a repository?", opts: ["Read", "Triage", "Write", "Maintain"], ans: [2], exp: "The 'Write' role grants the ability to push code. Triage manages issues, Read only clones." },
        { q: "What does the 'Secret Scanning' feature do?", opts: ["Encrypts passwords.", "Alerts when sensitive data (tokens, API keys) are accidentally committed.", "Scans for code formatting.", "Blocks unknown IP addresses."], ans: [1], exp: "Secret scanning detects known token patterns to prevent credential leakage." },
        { q: "Which of these roles are available for a repository at the organization level? (Choose five)", opts: ["Admin", "Maintain", "Write", "Triage", "Read", "Billing"], ans: [0, 1, 2, 3, 4], exp: "The standard repository roles in an org are Read, Triage, Write, Maintain, and Admin." },

        // Domain 7: Community
        { q: "What is 'InnerSource'?", opts: ["GitHub's open-source projects.", "Using open-source practices (collaboration, PRs) inside a private organization's boundaries.", "A local version of Git.", "A paid support tier."], ans: [1], exp: "InnerSource breaks down corporate silos by letting internal teams contribute to each other's code." },
        { q: "What is the primary purpose of GitHub Sponsors?", opts: ["To run advertisements.", "To fund open-source developers and maintainers directly.", "To pay for GitHub Actions.", "To hire developers."], ans: [1], exp: "Sponsors is the built-in funding mechanism for the open-source community." },
        { q: "If an open-source maintainer abandons a project, what is the standard mechanism for the community to keep it alive?", opts: ["Transfer ownership to GitHub.", "Fork the repository and continue development in the new fork.", "Buy it from Marketplace.", "The project is locked forever."], ans: [1], exp: "Forking ensures the code lives on and a new community can rally around the new hub." },
        { q: "Where can you discover and install third-party tools, Apps, and Actions?", opts: ["GitHub Marketplace", "GitHub Connect", "GitHub Insights", "GitHub Sponsors"], ans: [0], exp: "The Marketplace is the central store for extending GitHub's capabilities." },
        { q: "What does the 'SECURITY.md' file provide?", opts: ["Automated firewall rules.", "Instructions for security researchers on how to safely report vulnerabilities to the maintainers.", "A list of known bugs.", "Encryption keys."], ans: [1], exp: "SECURITY.md defines the responsible disclosure policy for a project." }
    ];

    // تكرار الأسئلة للوصول لـ 60 سؤال إذا كان البنك أقل لغرض المحاكاة
    while (questionsBank.length < 60) {
        let randomQ = questionsBank[Math.floor(Math.random() * 29)]; // نسخ عشوائي لتعبئة الـ 60
        questionsBank.push({...randomQ, q: randomQ.q + " (Copy " + questionsBank.length + ")"});
    }

    // المتغيرات
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;

    // التنقل بين الشاشات
    function goHome() {
        document.getElementById('landing-page').classList.remove('hidden');
        document.getElementById('exam-section').classList.add('hidden');
        document.getElementById('result-section').classList.add('hidden');
        document.getElementById('pdf-section').classList.add('hidden');
    }

    // -------------------------------------------
    // وضع الامتحان
    // -------------------------------------------
    function startExam() {
        document.getElementById('landing-page').classList.add('hidden');
        document.getElementById('result-section').classList.add('hidden');
        document.getElementById('exam-section').classList.remove('hidden');
        
        // خلط الأسئلة واختيار 60
        currentQuestions = [...questionsBank].sort(() => 0.5 - Math.random()).slice(0, 60);
        currentIndex = 0;
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        const q = currentQuestions[currentIndex];
        const isMulti = q.ans.length > 1;
        
        document.getElementById('q-counter').innerText = `السؤال ${currentIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('score-counter').innerText = `النقاط: ${score}`;
        document.getElementById('progress').style.width = `${(currentIndex / currentQuestions.length) * 100}%`;
        
        let qHtml = q.q;
        if(isMulti) {
            qHtml += `<span class="multi-hint">اختر ${q.ans.length} إجابات</span>`;
        }
        document.getElementById('q-text').innerHTML = qHtml;

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.opts.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.dataset.idx = idx;
            div.onclick = () => handleOptionClick(div, isMulti);
            container.appendChild(div);
        });

        document.getElementById('explanation').style.display = 'none';
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "تأكيد الإجابة";
        submitBtn.disabled = true;
    }

    function handleOptionClick(el, isMulti) {
        if (answered) return;
        
        if (!isMulti) {
            // سؤال إجابة واحدة: إلغاء التحديد عن الباقي
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        } else {
            // سؤال متعدد الإجابات: تبديل التحديد
            el.classList.toggle('selected');
        }

        // تفعيل زر التأكيد إذا كان هناك أي خيار محدد
        const hasSelection = document.querySelectorAll('.option.selected').length > 0;
        document.getElementById('submit-btn').disabled = !hasSelection;
    }

    function handleSubmit() {
        if (document.getElementById('submit-btn').disabled) return;

        if (!answered) {
            // مرحلة التصحيح
            answered = true;
            const q = currentQuestions[currentIndex];
            const options = document.querySelectorAll('.option');
            
            // جمع إجابات المستخدم
            let userAns = [];
            options.forEach(opt => {
                if (opt.classList.contains('selected')) {
                    userAns.push(parseInt(opt.dataset.idx));
                }
            });

            // التحقق من صحة الإجابة (يجب أن تتطابق المصفوفتان تماماً)
            const isFullyCorrect = JSON.stringify(userAns.sort()) === JSON.stringify(q.ans.sort());
            
            if (isFullyCorrect) {
                score++;
                document.getElementById('score-counter').innerText = `النقاط: ${score}`;
            }

            // تلوين الخيارات
            options.forEach(opt => {
                const idx = parseInt(opt.dataset.idx);
                const isSelected = opt.classList.contains('selected');
                const isCorrectAns = q.ans.includes(idx);

                if (isSelected && isCorrectAns) {
                    opt.classList.add('correct'); // اختارها وهي صحيحة
                } else if (isSelected && !isCorrectAns) {
                    opt.classList.add('wrong'); // اختارها وهي خاطئة
                } else if (!isSelected && isCorrectAns) {
                    opt.classList.add('missed'); // لم يخترها وكانت يجب أن تختار
                }
            });

            // إظهار الشرح
            const expEl = document.getElementById('explanation');
            expEl.innerHTML = `<strong>التوضيح (Explanation):</strong><br>${q.exp}`;
            expEl.style.display = 'block';

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = currentIndex === currentQuestions.length - 1 ? "إظهار النتيجة النهائية" : "انتقل للسؤال التالي";
        } else {
            // الانتقال للسؤال التالي
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }
    }

    function showResult() {
        document.getElementById('exam-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        
        const percentage = Math.round((score / currentQuestions.length) * 100);
        document.getElementById('final-score').innerText = `${percentage}%`;
        
        const msgEl = document.getElementById('result-msg');
        if (percentage >= 65) {
            msgEl.innerHTML = `<strong>ممتاز! لقد اجتزت الاختبار بنجاح 🎉</strong><br>أجبت على ${score} من ${currentQuestions.length} بشكل صحيح.`;
            document.getElementById('final-score').style.color = 'var(--success)';
        } else {
            msgEl.innerHTML = `<strong>للأسف لم تجتز الاختبار ❌</strong><br>درجة النجاح هي 65%. راجع الأخطاء في وضع الـ PDF وحاول مجدداً.`;
            document.getElementById('final-score').style.color = 'var(--danger)';
        }
    }

    // -------------------------------------------
    // وضع الدراسة (PDF)
    // -------------------------------------------
    function showPDF() {
        document.getElementById('landing-page').classList.add('hidden');
        document.getElementById('pdf-section').classList.remove('hidden');
        
        const content = document.getElementById('pdf-content');
        content.innerHTML = ''; // تنظيف

        // عرض البنك الأساسي (بدون النسخ المكررة)
        const uniqueQuestions = questionsBank; 

        uniqueQuestions.forEach((q, i) => {
            let isMulti = q.ans.length > 1 ? ` <span style="color:#9a6700; font-size:14px;">(اختر ${q.ans.length})</span>` : "";
            let html = `
                <div class="pdf-q-block">
                    <div class="pdf-q-text">Q${i+1}: ${q.q}${isMulti}</div>
                    <ul class="pdf-options">
            `;
            
            q.opts.forEach((opt, idx) => {
                let correctClass = q.ans.includes(idx) ? 'class="is-correct"' : '';
                let icon = q.ans.includes(idx) ? '✅ ' : '⬜ ';
                html += `<li ${correctClass}>${icon} ${opt}</li>`;
            });

            html += `
                    </ul>
                    <div class="pdf-exp"><strong>Explanation:</strong> ${q.exp}</div>
                </div>
            `;
            content.innerHTML += html;
        });
    }
</script>
